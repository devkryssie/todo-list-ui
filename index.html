<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Sound</title>
</head>

<body style=" font-family:sans-serif; padding-top:50px;">

  <h2>Click button to play sound 🎧</h2> 


  <audio id="sound" src="audio/WhatsApp Audio 2026-04-30 at 11.17.17 AM.aac"></audio>
  <audio id="sound2" src="audio/faaa_sound.wav"></audio>
  <audio id="sound3" src="audio/WhatsApp Audio 2026-04-30 at 8.53.43 AM.mpga"></audio>

  <!-- <button id="btn" >Play Sound</button> -->
   <div style="display:flex; gap: 10px;">
    <button id="btn" style="
      margin-top: 10px;
      padding: 12px 25px;
      border-radius: 1000px;
      border: none;
      background-color: blue;
      color: white;
      font-size: 16px;
    ">
      Play Sound
    </button>
    
    <button id="btn2" style="
      margin-top: 10px;
      padding: 12px 25px;
      border-radius: 1000px;
      border: none;
      background-color: purple;
      color: white;
      font-size: 16px;
    ">
      play sound 2
    </button>

        <button id="btn3" style="
      margin-top: 10px;
      padding: 12px 25px;
      border-radius: 1000px;
      border: none;
      background-color: pink;
      color: white;
      font-size: 16px;
    ">
      play sound 3
    </button>

   </div>

  <script>
    let audio = document.getElementById("sound");
    let btn = document.getElementById("btn");

    btn.addEventListener("click", function () {
      audio.play();
    });




        let audio2 = document.getElementById("sound2");
    let btn2 = document.getElementById("btn2");

    btn2.addEventListener("click", function () {
      audio2.play();
    });
        let audio3 = document.getElementById("sound3");
    let btn3 = document.getElementById("btn3");

    btn3.addEventListener("click", function () {
      audio3.play();
    });



    
  </script>

</body>
</html>
